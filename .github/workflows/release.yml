name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check required files exist
        run: |
          test -f docker-compose.yml
          test -f .env.example
          test -f config/kong.yml
          test -d volumes/db

      - name: Validate Kong configuration
        run: |
          python3 -c "import yaml; yaml.safe_load(open('config/kong.yml'))"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: build-and-push
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release notes
        id: release-notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          echo "Current tag: $CURRENT_TAG"

          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ] || [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          fi

          echo "Previous tag: '$PREVIOUS_TAG'"

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|%b" --no-merges)
          else
            COMMITS=$(git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:"%s|%b" --no-merges)
          fi

          BREAKING=""
          FEATURES=""
          FIXES=""

          while IFS='|' read -r subject body; do
            DETAILS=""
            if [ -n "$body" ]; then
              DETAILS=$(echo "$body" | grep -E "^- " | head -10 || true)
            fi

            if [[ "$subject" == break:* ]] || [[ "$subject" == break\(*\):* ]] || [[ "$body" == *"BREAKING CHANGE"* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^break[^:]*: //' | sed 's/^BREAKING CHANGE: //')
              BREAKING="${BREAKING}- ${CLEAN}"$'\n'
              if [ -n "$DETAILS" ]; then BREAKING="${BREAKING}${DETAILS}"$'\n'; fi
            elif [[ "$subject" == feat:* ]] || [[ "$subject" == feat\(*\):* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^feat[^:]*: //')
              FEATURES="${FEATURES}- ${CLEAN}"$'\n'
              if [ -n "$DETAILS" ]; then FEATURES="${FEATURES}${DETAILS}"$'\n'; fi
            elif [[ "$subject" == fix:* ]] || [[ "$subject" == fix\(*\):* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^fix[^:]*: //')
              FIXES="${FIXES}- ${CLEAN}"$'\n'
              if [ -n "$DETAILS" ]; then FIXES="${FIXES}${DETAILS}"$'\n'; fi
            fi
          done <<< "$COMMITS"

          NOTES=""
          if [ -n "$BREAKING" ]; then NOTES="${NOTES}## Breaking Changes"$'\n\n'"${BREAKING}"$'\n'; fi
          if [ -n "$FEATURES" ]; then NOTES="${NOTES}## Features"$'\n\n'"${FEATURES}"$'\n'; fi
          if [ -n "$FIXES" ]; then NOTES="${NOTES}## Bug Fixes"$'\n\n'"${FIXES}"$'\n'; fi

          if [ -z "$NOTES" ]; then
            NOTES="Release ${CURRENT_TAG}"$'\n\n'"See commit history for changes."
          fi

          echo "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Create release
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');
            const tagName = process.env.CURRENT_TAG;

            let existingRelease = null;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });
              existingRelease = releases.find(r => r.tag_name === tagName);
            } catch (e) {
              console.log('No existing releases found');
            }

            if (existingRelease) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id
              });
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `haex-sync-supabase ${tagName}`,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });
